<!DOCTYPE html>
<html>
<head><title>Password Reset - Coreflow</title></head>
<body>
  <h2>Reset Your Password</h2>
  <p>Enter your email address to receive a password reset link.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send Reset Link</button>
  </form>
</body>
</html>
