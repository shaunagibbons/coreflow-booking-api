<!DOCTYPE html>
<html>
<head><title>Set New Password - Coreflow</title></head>
<body>
  <h2>Set a New Password</h2>
  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Reset Password</button>
    </form>
  {% else %}
    <p>This password reset link is invalid or has expired. Please request a new one.</p>
  {% endif %}
</body>
</html>
