services:
  - type: web
    name: coreflow-booking-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn coreflow_booking_api.wsgi --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: coreflow-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.6"

databases:
  - name: coreflow-db
    plan: free
    databaseName: coreflow_booking
